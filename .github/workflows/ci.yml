name: My CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  
jobs:
  hello: 
    name: Hello Job
    runs-on: ubuntu-latest
    steps: 
      - name: Print Hello
        run: echo "Hello World"

  test:
    name: Test python package
    runs-on: ${{ matrix.os }}
    strategy:
    matrix:
      os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install package
        run: pip install .[test]
      - name: Run pytest
        run: pytest -vv
